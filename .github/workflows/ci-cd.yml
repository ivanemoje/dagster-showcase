name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_TAG: ghcr.io/${{ github.repository }}/api:latest
  # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-24.04

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run Linting
        run: ruff check . --fix --ignore E402

      - name: Run Tests
        env:
          REDIS_URL: redis://localhost:6379/0
          DB_PATH:   /tmp/test_pipeline.duckdb
          PYTHONPATH: .
        run: pytest --cov=dagster_pipeline --cov=api --cov-report=term-missing -v

  # ── 2. Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    needs: lint-and-test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id:     ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret:        ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags:                tag:github-deployer

      - name: Verify Connection
        run: |
          sleep 15
          tailscale status
          ping -c 3 ${{ secrets.SERVER_IP }} || echo "Ping failed, attempting SSH..."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.SERVER_IP }}
          username:        ${{ secrets.DEPLOYER_USER }}
          key:             ${{ secrets.DEPLOYER_SSH }}
          debug:           true
          timeout:         90s
          command_timeout: 20m
          script: |
            set -ex
            cd ${{ secrets.FOLDER_PATH }}
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker compose pull api worker beat
            docker compose up -d --no-build api worker beat dagster flower
            docker image prune -f